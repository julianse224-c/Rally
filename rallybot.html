<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rally Bot · Asistente Virtual</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
/* ═══════════════ RESET & BASE ═══════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1E40FF;--blue-b:#3B5BFF;--blue-glow:rgba(30,64,255,.25);
  --black:#0A0A0C;--dark:#111114;--dark2:#18181C;--dark3:#222228;
  --steel:#2A2A32;--mid:#444455;--light:#D0D0E0;--white:#F0F0FA;
  --gray:#888899;--green:#25D366;--radius:14px;
  --user-bg:#1E40FF;--bot-bg:#18181C;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Barlow',sans-serif;
  background:var(--black);
  color:var(--light);
  display:flex;align-items:center;justify-content:center;
}

/* ═══════════════ BACKGROUND ═══════════════ */
.bg-layer{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 60%,rgba(30,64,255,.08) 0%,transparent 70%),
    radial-gradient(ellipse 40% 40% at 80% 20%,rgba(30,64,255,.05) 0%,transparent 70%);
}
.bg-grid{
  position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(30,64,255,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(30,64,255,.04) 1px,transparent 1px);
  background-size:44px 44px;
}
.bg-gear{
  position:fixed;z-index:0;opacity:.03;color:var(--blue);
  animation:spin-g 40s linear infinite;
}
.bg-gear.g1{width:500px;height:500px;top:-100px;right:-100px}
.bg-gear.g2{width:280px;height:280px;bottom:40px;left:-60px;animation-direction:reverse;animation-duration:28s}
@keyframes spin-g{to{transform:rotate(360deg)}}

/* ═══════════════ CHAT CONTAINER ═══════════════ */
.chat-wrap{
  position:relative;z-index:1;
  width:min(820px,98vw);
  height:min(680px,96vh);
  background:var(--dark2);
  border:1px solid var(--steel);
  border-radius:20px;
  display:flex;flex-direction:column;
  overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.7),0 0 0 1px rgba(30,64,255,.1);
}

/* ═══════════════ HEADER ═══════════════ */
.chat-header{
  display:flex;align-items:center;gap:14px;
  padding:18px 24px;
  background:var(--dark);
  border-bottom:1px solid var(--steel);
  flex-shrink:0;
}
.bot-avatar{
  width:46px;height:46px;border-radius:12px;
  background:linear-gradient(135deg,var(--blue),var(--blue-b));
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;color:#fff;flex-shrink:0;
  position:relative;box-shadow:0 4px 16px var(--blue-glow);
}
.bot-online{
  position:absolute;bottom:2px;right:2px;
  width:10px;height:10px;background:#4ade80;border-radius:50%;
  border:2px solid var(--dark);
  animation:pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,.4)}50%{box-shadow:0 0 0 6px rgba(74,222,128,0)}}
.bot-info h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.3rem;letter-spacing:.08em;
  color:var(--white);line-height:1;
}
.bot-info p{
  font-size:.72rem;color:var(--gray);
  font-family:'Barlow Condensed',sans-serif;
  letter-spacing:.1em;text-transform:uppercase;
  margin-top:2px;
}
.header-actions{margin-left:auto;display:flex;gap:8px}
.hbtn{
  width:34px;height:34px;border-radius:8px;
  background:rgba(255,255,255,.05);border:1px solid var(--steel);
  color:var(--gray);font-size:.85rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,color .2s,border-color .2s;
}
.hbtn:hover{background:rgba(30,64,255,.15);color:var(--blue);border-color:var(--blue)}

/* ═══════════════ MESSAGES ═══════════════ */
.chat-messages{
  flex:1;overflow-y:auto;
  padding:24px 20px;
  display:flex;flex-direction:column;gap:16px;
  scroll-behavior:smooth;
}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-track{background:transparent}
.chat-messages::-webkit-scrollbar-thumb{background:var(--steel);border-radius:99px}

/* Message rows */
.msg-row{display:flex;gap:10px;align-items:flex-end;animation:msg-in .3s ease both}
.msg-row.user{flex-direction:row-reverse}
@keyframes msg-in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.msg-avatar{
  width:32px;height:32px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;
}
.msg-avatar.bot-av{
  background:linear-gradient(135deg,var(--blue),var(--blue-b));
  color:#fff;box-shadow:0 2px 8px var(--blue-glow);
}
.msg-avatar.user-av{
  background:var(--steel);color:var(--light);
}

.bubble{
  max-width:72%;padding:13px 16px;
  border-radius:16px;line-height:1.65;font-size:.9rem;
  position:relative;
}
.msg-row.bot .bubble{
  background:var(--bot-bg);border:1px solid var(--steel);
  border-bottom-left-radius:4px;
  color:var(--light);
}
.msg-row.user .bubble{
  background:var(--user-bg);
  border-bottom-right-radius:4px;
  color:#fff;
}

.bubble p{margin-bottom:8px}
.bubble p:last-child{margin-bottom:0}
.bubble strong{color:var(--white);font-weight:600}
.bubble em{color:var(--blue);font-style:normal}
.bubble ul{margin:6px 0 6px 4px;display:flex;flex-direction:column;gap:4px}
.bubble ul li{display:flex;gap:6px;align-items:flex-start;font-size:.85rem;color:var(--gray)}
.bubble ul li::before{content:'▸';color:var(--blue);flex-shrink:0;margin-top:1px}

.msg-time{
  font-size:.65rem;color:var(--mid);
  font-family:'Barlow Condensed',sans-serif;
  letter-spacing:.06em;margin-top:4px;
  padding:0 4px;
}
.msg-row.user .msg-time{text-align:right}

/* WA Button inside bubble */
.wa-btn-msg{
  display:inline-flex;align-items:center;gap:8px;
  margin-top:10px;padding:10px 16px;
  background:var(--green);color:#fff;
  border-radius:10px;font-family:'Rajdhani',sans-serif;
  font-size:.85rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  text-decoration:none;transition:background .2s,transform .2s;
  border:none;cursor:pointer;
}
.wa-btn-msg:hover{background:#1db954;transform:translateY(-1px)}

/* Quick replies */
.quick-replies{
  display:flex;flex-wrap:wrap;gap:8px;
  padding:0 20px 12px;flex-shrink:0;
}
.qr-chip{
  padding:7px 14px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--steel);border-radius:99px;
  font-size:.78rem;color:var(--light);
  font-family:'Barlow Condensed',sans-serif;
  font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;transition:background .2s,border-color .2s,color .2s;
  white-space:nowrap;
}
.qr-chip:hover{background:rgba(30,64,255,.15);border-color:var(--blue);color:var(--blue)}

/* Typing indicator */
.typing-indicator{
  display:flex;align-items:center;gap:5px;
  padding:12px 16px;background:var(--bot-bg);
  border:1px solid var(--steel);border-radius:16px;
  border-bottom-left-radius:4px;
  width:fit-content;
}
.typing-dot{
  width:7px;height:7px;background:var(--blue);border-radius:50%;
  animation:bounce-dot .9s ease-in-out infinite;
}
.typing-dot:nth-child(2){animation-delay:.18s}
.typing-dot:nth-child(3){animation-delay:.36s}
@keyframes bounce-dot{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* ═══════════════ INPUT ═══════════════ */
.chat-input-bar{
  padding:16px 20px;
  background:var(--dark);
  border-top:1px solid var(--steel);
  display:flex;gap:10px;align-items:flex-end;
  flex-shrink:0;
}
.input-wrap{
  flex:1;position:relative;
}
#userInput{
  width:100%;padding:12px 16px;
  background:var(--dark2);border:1px solid var(--steel);
  border-radius:12px;color:var(--white);
  font-family:'Barlow',sans-serif;font-size:.9rem;
  resize:none;outline:none;line-height:1.5;
  max-height:120px;overflow-y:auto;
  transition:border-color .2s;
}
#userInput:focus{border-color:var(--blue)}
#userInput::placeholder{color:var(--mid)}
#userInput::-webkit-scrollbar{width:3px}
#userInput::-webkit-scrollbar-thumb{background:var(--steel);border-radius:99px}

.send-btn{
  width:44px;height:44px;border-radius:12px;
  background:var(--blue);border:none;
  color:#fff;font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .2s,box-shadow .2s;
  flex-shrink:0;
  box-shadow:0 4px 14px var(--blue-glow);
}
.send-btn:hover{background:var(--blue-b);transform:translateY(-1px);box-shadow:0 6px 20px var(--blue-glow)}
.send-btn:disabled{background:var(--steel);box-shadow:none;cursor:not-allowed;transform:none}

/* ═══════════════ GEAR LOGO ═══════════════ */
.gear-logo-svg{animation:spin-g 8s linear infinite}

/* ═══════════════ RESPONSIVE ═══════════════ */
@media(max-width:600px){
  .chat-wrap{border-radius:0;height:100vh;width:100vw}
  .bubble{max-width:85%}
  .quick-replies{padding:0 12px 12px}
  .chat-messages{padding:16px 12px}
  .chat-input-bar{padding:12px}
}
  </style>
</head>
<body>

<!-- BG -->
<div class="bg-layer"></div>
<div class="bg-grid"></div>
<div class="bg-gear g1">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
    <path d="M43.3,0 L56.7,0 L59.4,14.2 C62.8,15.3 66,16.9 68.9,18.9 L82.7,13.8 L92.2,23.3 L87.1,37.1 C89.1,40,90.7,43.2,91.8,46.6 L106,49.3 L106,62.7 L91.8,65.4 C90.7,68.8,89.1,72,87.1,74.9 L92.2,88.7 L82.7,98.2 L68.9,93.1 C66,95.1,62.8,96.7,59.4,97.8 L56.7,112 L43.3,112 L40.6,97.8 C37.2,96.7,34,95.1,31.1,93.1 L17.3,98.2 L7.8,88.7 L12.9,74.9 C10.9,72,9.3,68.8,8.2,65.4 L-6,62.7 L-6,49.3 L8.2,46.6 C9.3,43.2,10.9,40,12.9,37.1 L7.8,23.3 L17.3,13.8 L31.1,18.9 C34,16.9,37.2,15.3,40.6,14.2 Z M50,34 A16,16 0 1,0 50,66 A16,16 0 1,0 50,34 Z"/>

  </svg>
</div>

<!-- CHAT -->
<div class="chat-wrap">

  <!-- Header -->
  <div class="chat-header">
    <div class="bot-avatar">
      <svg class="gear-logo-svg" width="22" height="22" viewBox="0 0 100 100" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M43.3,0 L56.7,0 L59.4,14.2 C62.8,15.3 66,16.9 68.9,18.9 L82.7,13.8 L92.2,23.3 L87.1,37.1 C89.1,40,90.7,43.2,91.8,46.6 L106,49.3 L106,62.7 L91.8,65.4 C90.7,68.8,89.1,72,87.1,74.9 L92.2,88.7 L82.7,98.2 L68.9,93.1 C66,95.1,62.8,96.7,59.4,97.8 L56.7,112 L43.3,112 L40.6,97.8 C37.2,96.7,34,95.1,31.1,93.1 L17.3,98.2 L7.8,88.7 L12.9,74.9 C10.9,72,9.3,68.8,8.2,65.4 L-6,62.7 L-6,49.3 L8.2,46.6 C9.3,43.2,10.9,40,12.9,37.1 L7.8,23.3 L17.3,13.8 L31.1,18.9 C34,16.9,37.2,15.3,40.6,14.2 Z M50,34 A16,16 0 1,0 50,66 A16,16 0 1,0 50,34 Z"/>
      </svg>

      <button class="hbtn" id="clearBtn" title="Limpiar chat"><i class="fas fa-rotate-left"></i></button>

<script>
/* ═══════════════════════════════════════════════════════════
   RALLY BOT · script
═══════════════════════════════════════════════════════════ */

const RALLY_SYSTEM = `Eres Rally Bot, el asistente virtual oficial de RALLY INGENIERÍA AUTOMOTRIZ, una empresa especializada en vehículos diésel (camiones, buses y maquinaria pesada) ubicada en Sogamoso, Boyacá, Colombia.

Tu personalidad: profesional, amable, directo y técnicamente competente. Usas un tono cálido pero experto. Respondes siempre en español.

== INFORMACIÓN OFICIAL DE LA EMPRESA ==

EMPRESA: Rally Ingeniería Automotriz
ESPECIALIDAD: Vehículos diésel — camiones, buses, maquinaria pesada
UBICACIÓN: Cra. 32 No. 8-20, Sogamoso, Boyacá, Colombia
TELÉFONOS: 310 721 3128 · 313 584 7773
EMAIL: rallyingenieriaautomotriz@hotmail.co
HORARIO: Lunes–Viernes 7:00 AM–6:00 PM · Sábado 8:00 AM–2:00 PM · Domingo cerrado

MISIÓN: Servicios integrales de mantenimiento, software y repuestos diésel con la más alta calidad tecnológica.
VISIÓN: Ser líder nacional y regional en ingeniería automotriz diésel sostenible.
POLÍTICA AMBIENTAL: Prácticas sostenibles, gestión de residuos, uso eficiente de recursos y cumplimiento normativo.

VENTAJAS CLAVE:
- Personal certificado y especializado
- Tecnología e infraestructura de última generación
- Garantía y atención personalizada
- Especialistas en AdBlue, EGR, Urea y DPF

SERVICIOS GENERALES:
- Mantenimiento preventivo y correctivo
- Diagnóstico computarizado
- Venta de repuestos originales y alternativos
- Logística de mantenimiento para flotas
- Asesoría técnica especializada
- Actualización de software de módulos

SERVICIOS MECÁNICOS:
- Overhaul y reparaciones mayores de motores: Scania, Mercedes-Benz, Chevrolet, Volvo
- Sistemas de transmisión, embrague y cajas
- Frenos: aire, ABS, EBS
- Suspensión, dirección, tren rodante, refrigeración

SERVICIOS ELÉCTRICOS:
- Sistemas de arranque y carga
- Alternadores y motores de arranque
- Baterías industriales
- Cableado e iluminación

SERVICIOS ELECTRÓNICOS:
- Escáner especializado: Scania, Mercedes-Benz, Chevrolet, Volvo
- Gestión de motor (EMS), ECUs, módulos, CAN Bus
- Calibración y configuración electrónica
- AdBlue, EGR, DPF, Urea

REPUESTOS DISPONIBLES (consultar disponibilidad y precios):
- Motor y tren motriz: pistones, anillos, bielas, cigüeñal, juntas, filtros, correas
- Frenos y suspensión: pastillas, discos, tambores, amortiguadores, muelles, bujes
- Transmisión: discos de embrague, volantes, sincronizadores, rodamientos, diferenciales
- Eléctrico/electrónico: baterías, alternadores, sensores, módulos ECU, inyectores
- Filtros y lubricantes: aceite, combustible, aire, aceites especiales
- Emisiones: válvulas EGR, filtros DPF, catalizadores, sensores AdBlue, dosificadores urea

MARCAS ATENDIDAS: Scania, Mercedes-Benz, Volvo, Chevrolet, MAN, International

== INSTRUCCIONES DE COMPORTAMIENTO ==

1. Responde solo con información de Rally Ingeniería Automotriz. No inventes datos ni precios exactos.
2. Para precios, siempre di que varían según el vehículo y el tipo de trabajo, e invita a consultar directamente.
3. Cuando alguien quiera AGENDAR UNA CITA, sigue este flujo:
   a) Pregunta: nombre del cliente, tipo de vehículo (marca/modelo), servicio que necesita, día y hora preferida.
   b) Cuando tengas esos datos, genera un mensaje de WhatsApp formateado.
   c) Incluye en tu respuesta el tag especial: [WA_LINK:mensaje codificado]
4. Sé conciso. Respuestas de máximo 150 palabras salvo que el usuario pida detalles.
5. Usa emojis con moderación (solo 1-2 por respuesta) para dar calidez.
6. Si preguntan algo fuera del alcance de Rally, redirige amablemente a los contactos.
7. Para el tag de WhatsApp usa este formato exacto sin espacios: [WA_LINK:NUMERO|MENSAJE] donde NUMERO es 573107213128 y MENSAJE es el texto codificado para URL.`;

const chatMessages = document.getElementById('chatMessages');
const userInput    = document.getElementById('userInput');
const sendBtn      = document.getElementById('sendBtn');
const clearBtn     = document.getElementById('clearBtn');
const quickReplies = document.getElementById('quickReplies');

let conversationHistory = [];
let isLoading = false;

/* ── Time ─────────────────────────────────────── */
function now() {
  return new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
}

/* ── Render Markdown-ish ─────────────────────── */
function renderText(text) {
  // Extract WA link if present
  let waLink = null;
  const waMatch = text.match(/\[WA_LINK:([^\|]+)\|([^\]]+)\]/);
  if (waMatch) {
    waLink = { number: waMatch[1].trim(), msg: waMatch[2].trim() };
    text = text.replace(/\[WA_LINK:[^\]]+\]/g, '').trim();
  }

  // Basic markdown
  let html = text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^[-•]\s(.+)/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .split('\n\n').map(p => p.trim() ? `<p>${p}</p>` : '').join('');

  if (!html.trim()) html = `<p>${text}</p>`;

  if (waLink) {
    const waUrl = `https://wa.me/${waLink.number}?text=${waLink.msg}`;
    html += `<br><a class="wa-btn-msg" href="${waUrl}" target="_blank" rel="noopener">
      <i class="fab fa-whatsapp"></i> Abrir WhatsApp para confirmar cita
    </a>`;
  }

  return html;
}

/* ── Add message ─────────────────────────────── */
function addMessage(role, text, skipHistory = false) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `msg-avatar ${role === 'bot' ? 'bot-av' : 'user-av'}`;
  avatar.innerHTML = role === 'bot'
    ? '<i class="fas fa-gear"></i>'
    : '<i class="fas fa-user"></i>';

  const col = document.createElement('div');
  col.style.display = 'flex';
  col.style.flexDirection = 'column';
  col.style.gap = '3px';
  col.style.maxWidth = '75%';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = renderText(text);

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = now();

  col.appendChild(bubble);
  col.appendChild(time);

  if (role === 'bot') {
    row.appendChild(avatar);
    row.appendChild(col);
  } else {
    row.appendChild(col);
    row.appendChild(avatar);
  }

  chatMessages.appendChild(row);
  chatMessages.scrollTop = chatMessages.scrollHeight;

  if (!skipHistory) {
    conversationHistory.push({
      role: role === 'bot' ? 'assistant' : 'user',
      content: text
    });
  }
}

/* ── Typing indicator ────────────────────────── */
function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing-row';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar bot-av';
  avatar.innerHTML = '<i class="fas fa-gear"></i>';

  const indicator = document.createElement('div');
  indicator.className = 'typing-indicator';
  indicator.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

  row.appendChild(avatar);
  row.appendChild(indicator);
  chatMessages.appendChild(row);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-row');
  if (el) el.remove();
}

/* ── API call ────────────────────────────────── */
async function sendToAPI(userText) {
  const messages = [
    ...conversationHistory.slice(-12), // keep last 12 turns
    { role: 'user', content: userText }
  ];

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: RALLY_SYSTEM,
      messages
    })
  });

  if (!response.ok) throw new Error(`HTTP ${response.status}`);
  const data = await response.json();
  return data.content.map(b => b.text || '').join('');
}

/* ── Send message ────────────────────────────── */
async function sendMessage(text) {
  if (!text.trim() || isLoading) return;
  isLoading = true;
  sendBtn.disabled = true;
  quickReplies.style.display = 'none';

  addMessage('user', text);
  userInput.value = '';
  userInput.style.height = 'auto';

  showTyping();

  try {
    const reply = await sendToAPI(text);
    removeTyping();
    addMessage('bot', reply);
  } catch (err) {
    removeTyping();
    addMessage('bot', '⚠️ Hubo un error de conexión. Por favor intenta de nuevo o contáctanos directamente al **310 721 3128**.', true);
    console.error(err);
  }

  isLoading = false;
  sendBtn.disabled = false;
  userInput.focus();
}

/* ── Quick replies ───────────────────────────── */
document.querySelectorAll('.qr-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    sendMessage(chip.dataset.msg);
  });
});

/* ── Input events ────────────────────────────── */
sendBtn.addEventListener('click', () => sendMessage(userInput.value));

userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(userInput.value);
  }
});

// Auto-resize textarea
userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
});

/* ── Clear chat ──────────────────────────────── */
clearBtn.addEventListener('click', () => {
  conversationHistory = [];
  chatMessages.innerHTML = '';
  quickReplies.style.display = 'flex';
  setTimeout(showWelcome, 100);
});

/* ── Welcome message ─────────────────────────── */
function showWelcome() {
  const welcome = `¡Hola! 👋 Soy **Rally Bot**, el asistente virtual de **Rally Ingeniería Automotriz**.

Estoy aquí para ayudarte con:

- Información sobre nuestros **servicios**
- **Repuestos** disponibles
- **Ubicación** y horarios
- **Agendar tu cita** directamente por WhatsApp

¿En qué te puedo ayudar hoy?`;

  addMessage('bot', welcome, true);
}

/* ── Init ────────────────────────────────────── */
showWelcome();
userInput.focus();
</script>
